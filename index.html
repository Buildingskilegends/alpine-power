<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alpine Power Tracker</title>

  <!-- PWA / iOS minimal & robust -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#38bdf8">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Alpine Tracker">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    /* Ultra-minimal, iOS-sicher, keine externen Ressourcen */
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #0e1117;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 32px 20px;
    }

    h1 {
      font-size: 26px;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      margin: 6px 0;
      max-width: 420px;
    }

    .hint {
      color: #8899aa;
      margin-top: 16px;
      font-size: 13px;
    }
  </style>
</head>
<body>

<div class="app">
  <h1>ALPINE POWER TRACKER</h1>
  <p>Install‑App für Athleten (iOS)</p>
  <p class="hint">Offline nutzbar · Fortschritt wird lokal auf deinem Gerät gespeichert</p>
</div>

<!-- Service Worker Registrierung (minimal, iOS-safe) -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('./service-worker.js');
  });
}
</script>

</body>
</html>
