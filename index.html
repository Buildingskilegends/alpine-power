<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alpine Power Tracker</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#38bdf8" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Alpine Tracker" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;800&family=Barlow:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    body { margin:0; font-family: Barlow, sans-serif; background:#0e1117; color:#e2e8f0; }
    h1 { font-family: 'Barlow Condensed', sans-serif; letter-spacing:2px; }
    .app {
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:40px 20px;
    }
    .hint { color:#64748b; margin-top:12px; font-size:14px; max-width:420px; }
  </style>
</head>
<body>

<div class="app">
  <h1>ALPINE POWER TRACKER</h1>
  <p>PWA-Version für Athleten</p>
  <p class="hint">Diese App ist offline nutzbar und speichert deinen Trainingsfortschritt lokal auf deinem Gerät.</p>
</div>

<!-- Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
